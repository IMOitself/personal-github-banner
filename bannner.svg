<svg width="880" height="180" viewBox="0 0 880 180" xmlns="http://www.w3.org/2000/svg">
  <foreignObject x="0" y="0" width="880" height="180">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .banner { 
          width: 880px;
          height: 180px; 
          box-sizing: border-box; 
          padding: 0 20px; 
          display: flex; 
          flex-direction: column; 
          font-family: 'JetBrains Mono', monospace; 
          color: #F4F4F4;
          background-color: #2B2D5B;
          letter-spacing: 1.5px;
        }
        .divider { 
          height: 1px; 
          width: 100%; 
          margin: 10px 0;
          background: linear-gradient(90deg, transparent, #F4F4F4, #F4F4F4, transparent);
        }
        .today-header {margin-bottom: 10px}
        .title { margin: 0; padding: 18px 0 0; text-align: center; font-size: 15px; font-weight: 700; letter-spacing: 3px; }
        .date { margin: 0 0 16px; text-align: center; font-size: 12px; letter-spacing: 1.5px; color: #ABABAB; }
        .dashboard { display: flex; flex: 1; }
        .col { flex: 1; text-align: center; }
        .label { font-size: 10px; letter-spacing: 1.2px; color: #ABABAB; }
        .val { font-size: 32px; font-weight: 700; color: #F4F4F4; line-height: 1.25; margin: 6px 0 }
        .v-line { width: 1px; height: 64px; background: #ABABAB; opacity: 0.4 }
      </style>

      <div class="banner">
        <div class="today-header">
          <h2 class="title">testing testing idk</h2>
          <div class="divider"/>
          <p class="date">MARCH 5, 2026</p>
        </div>

        <div class="dashboard">
          <div class="col">
            <div class="label">total commits</div>
            <div class="val">1,234</div>
          </div>
          
          <div class="v-line"></div>

          <div class="col">
            <div class="label" style="margin-bottom: 4px;">daily streak</div>
            <div class="val">100</div>
            <!-- <div class="label" style="font-size: 9px; margin-top: 2px; margin-bottom: 0;">days</div> -->
          </div>
          
          <!-- <div class="v-line"></div>

          <div class="col">
            <div class="label">just watched</div>
            <div class="val" style="font-size: 13px; min-height: 2lh; align-content: center">1k player civilization 3</div>
            <div class="label">● minecraft ● yt</div>
          </div> -->
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
