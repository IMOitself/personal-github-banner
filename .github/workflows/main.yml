name: Update Banners

on:
  schedule:
    # every 2 hours everyday:D
    - cron: 0 */2 * * *
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-svg:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Manila

    steps:
      - name: checkout this repo
        uses: actions/checkout@v6.0.2

      - name: setup python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run >:D
        run: python main.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      
      - name: get commit message
        run: |
          COMMITMSG=$(python .github/workflows/commit-msg.py)
          echo "COMMIT_MSG=$COMMITMSG" >> $GITHUB_ENV

      - name: commit and push
        run: |
          git config user.name "IMO's Bot >:D"
          git config user.email "imo@bot.angryface"
          git add .
          git commit -m "${{ env.COMMIT_MSG }}" || echo "no changes to commit :]"
          git push