query($number_of_repos:Int!) {
  viewer {
    name
    repositories(
      last: $number_of_repos,
      orderBy:  {
         field: UPDATED_AT, direction: ASC
      }
    ) {
      nodes {
        name
        defaultBranchRef {
          target {
            ... on Commit {
              history {
                totalCount
              }
            }
          }
        }
      }
    }
  }
}