query($viewerId: ID!) {
  repository(owner: "IMOitself" name: "IMOitself"){
    nameWithOwner
    defaultBranchRef {
      target {
        ... on Commit {
            history(author: {id: $viewerId}) { 
              totalCount
            }
            committername: 
            history(first: 1, author: {id: $viewerId}) { 
              nodes { 
                author { 
                  name
                  email
                }
              }
            }
        }
      }
    }
  }
}