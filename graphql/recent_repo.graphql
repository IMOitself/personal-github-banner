query ($viewerId: ID!) {
  viewer {
    repositories(first: 5, orderBy: {field: UPDATED_AT, direction: DESC}) {
      nodes {
        name
        isArchived
        description
        primaryLanguage {
          name
          color
        }
        defaultBranchRef {
            target {
                ... on Commit {
                    history(author: {id: $viewerId}, first: 1) { 
                       nodes {
                        committedDate
                       }
                    }
                }
            }
        }
      }
    }
  }
}