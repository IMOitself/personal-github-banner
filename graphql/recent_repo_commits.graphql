query ($viewerId: ID!) {
  viewer {
    repositories(first: 1, orderBy: {field: UPDATED_AT, direction: DESC}) {
      nodes {
        defaultBranchRef {
            target {
                ... on Commit {
                    history(author: {id: $viewerId}, first: 30) { 
                       nodes {
                        parents {
                          totalCount
                        }
                        deletions
                        additions
                       }
                    }
                }
            }
        }
      }
    }
  }
}