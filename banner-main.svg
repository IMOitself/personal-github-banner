<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <foreignObject x="0" y="0" width="680" height="180">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .banner { 
          width: 680px;
          height: 180px; 
          box-sizing: border-box; 
          padding: 0 20px; 
          display: flex; 
          flex-direction: column; 
          justify-items: center;
          font-family: 'JetBrains Mono', monospace; 
          color: #F4F4F4;
          background-color: #2B2D5B;
          letter-spacing: 1.5px;
        }
        .divider { 
          height: 1px; 
          width: 100%; 
          margin: 10px 0;
          background: linear-gradient(90deg, transparent, #F4F4F4, #F4F4F4, transparent);
        }
        .today-header {margin-bottom: 5px}
        .title { margin: 0; padding: 18px 0 0; text-align: center; font-size: 15px; font-weight: 700; letter-spacing: 3px; }
        .date { margin: 16px 0; text-align: center; font-size: 14px; letter-spacing: 1.5px; color: #F4F4F4; }
        .dashboard { display: flex; flex: 1; }
        .col { flex: 1; text-align: center; }
        .label { font-size: 18px; letter-spacing: 1.2px; color: #F4F4F4; }
        .val { height: 60px; overflow: hidden; font-size: 48px; font-weight: 700; color: #F4F4F4; letter-spacing: 5px; line-height: 1.25; margin: 6px 0 }
        .v-line { width: 4px; height: 80%; background: #ABABAB; opacity: 0.4 }
        .slot-strip { display: flex; flex-direction: column; animation: scrollDown 4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes scrollDown {
          0% { transform: translateY(-300%); } 
          50% { transform: translateY(-300%); } 
          100% { transform: translateY(0); }
        }
      </style>

      <div class="banner">
        <!-- <div class="today-header">
          <h2 class="title">testing testing idk</h2> -->
          <!-- <div class="divider"/> -->
          <p class="date">MARCH 5, 2026</p>
        <!-- </div> -->

        <div class="dashboard">
          <div class="col">
            <div class="label">total commits</div>
            <div class="val">
              <div class="slot-strip">
                <div>2019</div> <div>2018</div> <div>2017</div>
              </div>
            </div>
          </div>
          
          <div class="v-line"></div>

          <div class="col">
            <div class="label" style="margin-bottom: 4px;">daily streak</div>
            <div class="val">
              <div class="slot-strip">
                <div>100</div>
                <div>99</div>
              </div>
            </div>
            <!-- <div class="label" style="font-size: 9px; margin-top: 2px; margin-bottom: 0;">days</div> -->
          </div>
          
          <!-- <div class="v-line"></div>

          <div class="col">
            <div class="label">just watched</div>
            <div class="val" style="font-size: 13px; min-height: 2lh; align-content: center">1k player civilization 3</div>
            <div class="label">● minecraft ● yt</div>
          </div> -->
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
