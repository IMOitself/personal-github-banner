      <style>
        .banner { 
          width: 680px;
          height: 230px; 
          box-sizing: border-box; 
          padding: 24px; 
          display: flex; 
          flex-direction: column; 
          justify-items: center;
          font-family: 'JetBrains Mono', monospace; 
          color: #F4F4F4;
          background-color: #2B2D5B;
          gap: 18px;
        }
        .label { font-size: 16px; color: #F4F4F4; }
        .repo-card {
          background: transparent;
          padding: 16px;
          border-radius: 8px;
          border: 2px solid #f4f4f489;
          flex: 1;
          margin: 0 24px;
          margin-bottom: 8px;
          display: flex;
          flex-direction: column;
          position: relative;
          overflow: hidden;
        }
        .repo-header { display: flex; align-items: center; gap: 8px; }
        .icon { width: 24px; height: 24px; fill: #F4F4F4; }
        .repo-name { font-size: 18px; font-weight: bold; }
        .repo-is-archive { font-size: 12px; border-radius: 20px; padding: 2px 8px; border: 1px solid #EEC444; color: #EEC444; }
        .repo-body { font-size: 16px; padding: 12px 0px; margin-right: 25%; opacity: 0.8; }
        .repo-footer { font-size: 12px; display: flex; align-items: center; gap: 32px; color: rgba(255, 255, 255, 0.8); }
        .repo-language { display: flex; align-items: center; gap: 4px; }
        .repo-language-color { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.3); }
        .repo-stars { display: flex; align-items: center; gap: 4px; }
        .repo-updated-at { display: flex; align-items: center; gap: 4px; opacity: 0.8; }
        .repo-updated-at-icon { width: 18px; height: 18px; fill: #F4F4F4; opacity: 0.8; }

        .sparkline-graph {
          position: absolute;
          top: 40%;
          left: 70%;
          width: 30%;
          height: 100%;
          z-index: 1;
          opacity: 0.5;
        }
      </style>

